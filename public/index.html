<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }

    #messages {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      background: #f9f9f9;
    }

    .message {
      padding: 8px;
      margin: 5px 0;
      background: #e3f2fd;
      border-radius: 4px;
    }

    #input {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2196F3;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #1976D2;
    }

    #status {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>WebSocket Chat</h1>

  <div id="status">Desconectado</div>
  <div id="username-display" style="font-size: 14px; color: #666; margin-bottom: 10px;"></div>

  <div id="messages"></div>

  <input
    type="text"
    id="input"
    placeholder="Escribe un mensaje..."
    disabled
  />

  <button id="sendBtn" onclick="enviarMensaje()" disabled>Enviar</button>

  <script>
    const ws = new WebSocket('ws://localhost:8080');
    const messagesDiv = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const statusEl = document.getElementById('status');
    const usernameDisplay = document.getElementById('username-display');
    const sendBtn = document.getElementById('sendBtn');

    let currentUsername = null;

    ws.onopen = () => {
      statusEl.textContent = 'Conectado ✓';
      statusEl.style.color = 'green';

      const username = prompt('¿Cuál es tu nombre?');
      if (username && username.trim()) {
        currentUsername = username.trim();
        usernameDisplay.textContent = `Tú: ${currentUsername}`;

        ws.send(JSON.stringify({
          type: 'setUsername',
          username: currentUsername
        }));

        inputEl.disabled = false;
        sendBtn.disabled = false;
      } else {
        ws.close();
      }
    };

    ws.onmessage = async (event) => {
      let data;

      if (event.data instanceof Blob) {
        data = JSON.parse(await event.data.text());
      } else {
        data = JSON.parse(event.data);
      }

      if (data.type === 'chat') {
        const message = document.createElement('div');
        message.className = 'message';
        message.innerHTML = `<strong>${data.username}:</strong> ${data.text}`;
        messagesDiv.appendChild(message);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      } else if (data.type === 'userJoined') {
        const evento = document.createElement('div');
        evento.style.padding = '8px';
        evento.style.margin = '5px 0';
        evento.style.background = '#c8e6c9';
        evento.style.borderRadius = '4px';
        evento.style.fontStyle = 'italic';
        evento.style.color = '#2e7d32';
        evento.textContent = `✓ ${data.username} se conectó`;
        messagesDiv.appendChild(evento);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      } else if (data.type === 'userLeft') {
        const evento = document.createElement('div');
        evento.style.padding = '8px';
        evento.style.margin = '5px 0';
        evento.style.background = '#ffccbc';
        evento.style.borderRadius = '4px';
        evento.style.fontStyle = 'italic';
        evento.style.color = '#d84315';
        evento.textContent = `✕ ${data.username} se desconectó`;
        messagesDiv.appendChild(evento);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    };

    ws.onclose = () => {
      statusEl.textContent = 'Desconectado';
      statusEl.style.color = 'red';
      inputEl.disabled = true;
      sendBtn.disabled = true;
    };

    ws.onerror = (error) => {
      console.error('Error:', error);
      statusEl.textContent = 'Error de conexión';
      statusEl.style.color = 'orange';
    };

    function enviarMensaje() {
      const mensaje = inputEl.value.trim();
      if (mensaje) {
        ws.send(JSON.stringify({
          type: 'chat',
          text: mensaje
        }));
        inputEl.value = '';
      }
    }

    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        enviarMensaje();
      }
    });
  </script>
</body>
</html>
